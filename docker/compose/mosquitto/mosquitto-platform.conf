# Mosquitto config — Vulis platform broker
# MQTT 5 with username/password auth, Sparkplug-ready.
# Password file is generated on first boot by entrypoint.sh from env vars
# (VULIS_MQTT_USER / VULIS_MQTT_PASS) — creds are NEVER baked into the image.

# ─── Listener (MQTT) ───────────────────────────────────────────
listener 1883
allow_anonymous false
password_file /mosquitto/config/passwd

# ─── Listener (WebSocket — optional, for browser dev tools) ────
listener 9001
protocol websockets
allow_anonymous false
password_file /mosquitto/config/passwd

# ─── Persistence ───────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ─── Logging ───────────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
connection_messages true

# ─── QoS / sessions (Sparkplug B needs persistent sessions) ────
max_keepalive 600
max_inflight_messages 20
max_queued_messages 1000
allow_zero_length_clientid true

# ─── Limits ────────────────────────────────────────────────────
max_connections -1
message_size_limit 1048576
