# Mosquitto config — Vulis dev broker
# MQTT 5, anonymous allowed for dev only.
# Sparkplug B payloads are binary (protobuf); no special broker config is
# required — they are just MQTT messages on the spBv1.0/ topic tree.

# ─── Listener ────────────────────────────────────────────────
listener 1883
allow_anonymous true

# ─── WebSocket listener (optional, for browser-based dev tools) ─
listener 9001
protocol websockets

# ─── Persistence ─────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ─── Logging ─────────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
connection_messages true

# ─── QoS / sessions ──────────────────────────────────────────
# Sparkplug B relies on persistent sessions + retained messages.
max_keepalive 600
max_inflight_messages 20
max_queued_messages 1000
allow_zero_length_clientid false

# ─── Limits (dev) ────────────────────────────────────────────
max_connections -1
message_size_limit 1048576
