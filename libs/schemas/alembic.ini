# Alembic configuration for Vulis.
#
# The actual engine + URL wiring happens in env.py (read from VULIS_POSTGRES_DSN
# or SQLALCHEMY_URL). This file mostly configures script location + naming.

[alembic]
script_location = alembic
prepend_sys_path = src
version_path_separator = os
sqlalchemy.url =                  # overridden by env.py at runtime

# Timezone for the revision timestamps. Leave empty for local time.
timezone = UTC

# Max length for the slugified revision message appended to the revision id.
rev_id_length = 8

[post_write_hooks]
# (none for now)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
