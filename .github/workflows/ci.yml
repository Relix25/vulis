name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── DCO: every commit must be signed off ───────────────────
  dco:
    name: DCO sign-off
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: DCO check
        uses: sourcemint/dco@v1
        # Alternative: pcjacobs/dco-action@v1

  # ─── Reuse: license headers compliance ──────────────────────
  reuse:
    name: License headers (reuse)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install reuse
        run: pip install reuse
      - name: reuse lint
        run: reuse lint

  # ─── Python: lint, type-check, tests ────────────────────────
  python:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    needs: [dco, reuse]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies (libs + services)
        run: uv sync --all-packages || uv pip install -e libs/core-py -e libs/storage -e libs/obs-py

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy (libs strict)
        run: uv run mypy libs || true

      - name: Pytest
        run: uv run pytest

  # ─── Aggregate status gate ──────────────────────────────────
  required:
    name: All checks required
    if: always()
    runs-on: ubuntu-latest
    needs: [dco, reuse, python]
    steps:
      - name: Fail if any required job failed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
      - name: Pass
        run: echo "All required checks passed."
