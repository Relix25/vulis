name: Docs

# Builds and (on main) deploys the MkDocs Material site to GitHub Pages.
# Air-gap note: a mirror of the built site is also pushed to the server via
# `vulis relay sync` so it is reachable offline (see ADR 0007).

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'ADR/**'
      - 'README.md'
      - 'ARCHITECTURE.md'
      - 'CONTRIBUTING.md'
      - 'GOVERNANCE.md'
      - 'SECURITY.md'
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install MkDocs Material
        run: pip install mkdocs-material mkdocs-git-revision-date-localized-plugin

      - name: Build site
        run: mkdocs build --strict

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
